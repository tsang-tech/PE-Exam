<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>體育科成績管理系統 (進階版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1200px; margin: auto; }
        
        /* Tab Styles */
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 12px 25px; cursor: pointer; border: 1px solid transparent; border-bottom: none; font-weight: bold; color: #666; }
        .tab.active { color: #8e44ad; border-color: #ddd; border-bottom: 2px solid white; margin-bottom: -2px; background: white; border-radius: 8px 8px 0 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h2 { color: #2c3e50; margin-top: 0; }
        .controls { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #8e44ad; color: white; position: sticky; top: 0; }
        .knowledge-th { background-color: #2980b9; }
        
        select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; width: 60px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
        .btn-purple { background-color: #8e44ad; }
        .btn-blue { background-color: #2980b9; }
        .btn-green { background-color: #27ae60; }
        .btn:hover { opacity: 0.8; }
        
        .setup-section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        input[type="text"] { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .total-score { font-weight: bold; color: #e74c3c; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 體育科綜合成績系統</h2>

    <div class="tabs">
        <div class="tab active" onclick="showTab('summary')">📊 總分匯總</div>
        <div class="tab" onclick="showTab('skills')">🏀 體育技能 (40%)</div>
        <div class="tab" onclick="showTab('knowledge')">📖 體育知識 (10%)</div>
        <div class="tab" onclick="showTab('settings')">⚙️ 考核內容設置</div>
    </div>

    <div id="summary" class="tab-content active">
        <div class="controls">
            <b>第一步：上傳學生名單 Excel</b>
            <input type="file" id="excelInput" accept=".xlsx, .xls" />
            <button class="btn btn-green" onclick="exportFinalScores()">💾 匯出最終成績單</button>
        </div>
        <table id="summaryTable">
            <thead>
                <tr>
                    <th>班別</th><th>姓名</th><th>體適能 (40%)</th><th>技能 (40%)</th><th>知識 (10%)</th><th>態度 (10%)</th><th>總分 (100)</th>
                </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
        </table>
    </div>

    <div id="skills" class="tab-content">
        <div class="controls">
            <span>技能項目考核中... 分數範圍 0-10 分</span>
        </div>
        <div style="overflow-x:auto;">
            <table id="skillsTable">
                <thead id="skillsHeader"></thead>
                <tbody id="skillsBody"></tbody>
            </table>
        </div>
    </div>

    <div id="knowledge" class="tab-content">
        <div class="controls">
            <span>體育知識考核中... 分數範圍 0-5 分</span>
        </div>
        <div style="overflow-x:auto;">
            <table id="knowledgeTable">
                <thead id="knowledgeHeader"></thead>
                <tbody id="knowledgeBody"></tbody>
            </table>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="setup-section">
            <h3>🏀 設置技能評分項目</h3>
            <p>輸入項目後點擊新增（如：籃球傳球、50米短跑）</p>
            <input type="text" id="newSkillName" placeholder="項目名稱">
            <button class="btn btn-purple" onclick="addItem('skills')">新增項目</button>
            <button class="btn btn-blue" onclick="exportConfig()">💾 匯出考核架構</button>
            <button class="btn btn-blue" onclick="document.getElementById('importConfigInput').click()">📂 匯入考核架構</button>
            <input type="file" id="importConfigInput" style="display:none" accept=".xlsx" onchange="importConfig(event)">
        </div>
        <div class="setup-section">
            <h3>📖 設置知識評分題目</h3>
            <input type="text" id="newKnowledgeName" placeholder="題目名稱">
            <button class="btn btn-blue" onclick="addItem('knowledge')">新增題目</button>
        </div>
    </div>
</div>

<script>
    let students = [];
    let config = {
        skillsItems: ["技能項目1"],
        knowledgeItems: ["知識題目1"]
    };

    // 切換分頁
    function showTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        renderAll();
    }

    // 新增評分項目
    function addItem(type) {
        const input = document.getElementById(type === 'skills' ? 'newSkillName' : 'newKnowledgeName');
        if (!input.value) return;
        if (type === 'skills') config.skillsItems.push(input.value);
        else config.knowledgeItems.push(input.value);
        input.value = '';
        renderAll();
    }

    // 處理 Excel 上傳 (名單)
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
            
            students = json.slice(1).filter(row => row[0] && row[1]).map(row => ({
                cls: row[0],
                name: row[1],
                fitnessRaw: (parseInt(row[8]) || 0) + (parseInt(row[10]) || 0) + (parseInt(row[12]) || 0) + (parseInt(row[14]) || 0),
                skillScores: {},
                knowledgeScores: {},
                attitude: 0
            }));
            renderAll();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function renderAll() {
        renderSummary();
        renderSkills();
        renderKnowledge();
    }

    // 渲染總分頁
    function renderSummary() {
        const body = document.getElementById('summaryBody');
        body.innerHTML = '';
        students.forEach((s, idx) => {
            const fitness40 = s.fitnessRaw * 4;
            const skillTotal = Object.values(s.skillScores).reduce((a,b) => a+b, 0);
            const skillFinal = config.skillsItems.length ? (skillTotal / (config.skillsItems.length * 10)) * 40 : 0;
            
            const knowTotal = Object.values(s.knowledgeScores).reduce((a,b) => a+b, 0);
            const knowFinal = config.knowledgeItems.length ? (knowTotal / (config.knowledgeItems.length * 5)) * 10 : 0;

            const total = fitness40 + skillFinal + knowFinal + s.attitude;

            body.innerHTML += `<tr>
                <td>${s.cls}</td><td>${s.name}</td>
                <td>${fitness40}</td>
                <td>${skillFinal.toFixed(1)}</td>
                <td>${knowFinal.toFixed(1)}</td>
                <td><input type="number" value="${s.attitude}" style="width:50px" oninput="students[${idx}].attitude=parseFloat(this.value)||0; renderSummary()"></td>
                <td class="total-score">${total.toFixed(1)}</td>
            </tr>`;
        });
    }

    // 渲染技能頁 (含下拉單)
    function renderSkills() {
        const head = document.getElementById('skillsHeader');
        const body = document.getElementById('skillsBody');
        head.innerHTML = `<tr><th>班別</th><th>姓名</th>${config.skillsItems.map(i => `<th>${i}</th>`).join('')}<th>技能總分(40%)</th></tr>`;
        
        body.innerHTML = '';
        students.forEach((s, sIdx) => {
            let rowHtml = `<td>${s.cls}</td><td>${s.name}</td>`;
            config.skillsItems.forEach(item => {
                const currentVal = s.skillScores[item] || 0;
                rowHtml += `<td><select onchange="updateScore(${sIdx}, 'skills', '${item}', this.value)">
                    ${[...Array(11).keys()].map(v => `<option value="${v}" ${currentVal==v?'selected':''}>${v}</option>`).join('')}
                </select></td>`;
            });
            const skillTotal = Object.values(s.skillScores).reduce((a,b) => a+b, 0);
            const skillFinal = config.skillsItems.length ? (skillTotal / (config.skillsItems.length * 10)) * 40 : 0;
            rowHtml += `<td class="total-score">${skillFinal.toFixed(1)}</td>`;
            body.innerHTML += `<tr>${rowHtml}</tr>`;
        });
    }

    // 渲染知識頁 (含下拉單)
    function renderKnowledge() {
        const head = document.getElementById('knowledgeHeader');
        const body = document.getElementById('knowledgeBody');
        head.innerHTML = `<tr><th>班別</th><th>姓名</th>${config.knowledgeItems.map(i => `<th class="knowledge-th">${i}</th>`).join('')}<th>知識總分(10%)</th></tr>`;
        
        body.innerHTML = '';
        students.forEach((s, sIdx) => {
            let rowHtml = `<td>${s.cls}</td><td>${s.name}</td>`;
            config.knowledgeItems.forEach(item => {
                const currentVal = s.knowledgeScores[item] || 0;
                rowHtml += `<td><select onchange="updateScore(${sIdx}, 'knowledge', '${item}', this.value)">
                    ${[...Array(6).keys()].map(v => `<option value="${v}" ${currentVal==v?'selected':''}>${v}</option>`).join('')}
                </select></td>`;
            });
            const knowTotal = Object.values(s.knowledgeScores).reduce((a,b) => a+b, 0);
            const knowFinal = config.knowledgeItems.length ? (knowTotal / (config.knowledgeItems.length * 5)) * 10 : 0;
            rowHtml += `<td class="total-score">${knowFinal.toFixed(1)}</td>`;
            body.innerHTML += `<tr>${rowHtml}</tr>`;
        });
    }

    function updateScore(sIdx, type, item, val) {
        const value = parseFloat(val);
        if (type === 'skills') students[sIdx].skillScores[item] = value;
        else students[sIdx].knowledgeScores[item] = value;
    }

    // 匯出架構 (Excel)
    function exportConfig() {
        const data = [["Type", "ItemName"]];
        config.skillsItems.forEach(i => data.push(["Skill", i]));
        config.knowledgeItems.forEach(i => data.push(["Knowledge", i]));
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "AssessmentConfig");
        XLSX.writeFile(wb, "體育科考核內容配置.xlsx");
    }

    // 匯入架構
    function importConfig(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            config.skillsItems = json.filter(r => r.Type === 'Skill').map(r => r.ItemName);
            config.knowledgeItems = json.filter(r => r.Type === 'Knowledge').map(r => r.ItemName);
            alert("考核架構匯入成功！");
            renderAll();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    // 匯出最終成績單
    function exportFinalScores() {
        let exportData = [["班別", "姓名", "體適能(40%)", "技能(40%)", "知識(10%)", "態度(10%)", "最終總分"]];
        students.forEach(s => {
            const fitness40 = s.fitnessRaw * 4;
            const skillTotal = Object.values(s.skillScores).reduce((a,b) => a+b, 0);
            const skillFinal = config.skillsItems.length ? (skillTotal / (config.skillsItems.length * 10)) * 40 : 0;
            const knowTotal = Object.values(s.knowledgeScores).reduce((a,b) => a+b, 0);
            const knowFinal = config.knowledgeItems.length ? (knowTotal / (config.knowledgeItems.length * 5)) * 10 : 0;
            const total = fitness40 + skillFinal + knowFinal + s.attitude;
            exportData.push([s.cls, s.name, fitness40, skillFinal.toFixed(1), knowFinal.toFixed(1), s.attitude, total.toFixed(1)]);
        });
        const ws = XLSX.utils.aoa_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "成績匯總");
        XLSX.writeFile(wb, "體育科最終成績單.xlsx");
    }
</script>
</body>
</html>
